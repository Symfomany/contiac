# Configuration SonarQube pour le projet Continue (AI Code Assistant)
sonar.projectKey=continue-dev
sonar.projectName=Continue AI Code Assistant
sonar.projectVersion=1.2.1
sonar.sourceEncoding=UTF-8

# Dossiers sources principaux (chemins relatifs à la racine)
sonar.sources=core,extensions/vscode/src,extensions/intellij/src,gui/src,packages

# Tests
sonar.tests=core/test,extensions/vscode/e2e,gui/src

sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/*.vitest.ts,**/*.test.kt
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**

# Exclusions optimisées pour Continue
sonar.exclusions=**/node_modules/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/target/**,\
    **/*.test.ts,\
    **/*.test.js,\
    **/*.spec.ts,\
    **/*.spec.js,\
    **/*.vitest.ts,\
    **/*.test.kt,\
    **/vendor/**,\
    **/binary/**,\
    **/media/**,\
    **/__mocks__/**,\
    **/tree-sitter/**,\
    **/textmate-syntaxes/**,\
    **/manual-testing-sandbox/**,\
    **/.vscode/**,\
    **/.idea/**,\
    **/.run/**,\
    **/gradle/wrapper/**,\
    **/testdata/**,\
    scripts/**,\
    docs/**,\
    eval/**,\
    sync/**,\
    actions/**

# Support multi-langages amélioré
sonar.javascript.file.suffixes=.js,.jsx
sonar.typescript.file.suffixes=.ts,.tsx
sonar.kotlin.file.suffixes=.kt,.kts
sonar.python.file.suffixes=.py


# Configuration coverage multi-modules
sonar.typescript.lcov.reportPaths=gui/coverage/lcov.info,core/coverage/lcov.info,extensions/vscode/coverage/lcov.info,extensions/cli/coverage/lcov.info
sonar.javascript.lcov.reportPaths=gui/coverage/lcov.info
sonar.coverage.jacoco.xmlReportPaths=**/coverage/jacoco.xml


# Optimisations pour projets multi-langages
sonar.analysis.mode=publish
sonar.scm.provider=git
sonar.scm.forceReloadAll=false

# Configuration qualité
sonar.qualitygate.wait=true
sonar.python.version=3.8,3.9,3.10,3.11,3.12

# Token d'authentification (à remplacer par votre propre token)
sonar.token=squ_9b0cb417e8b3e4305bcefc0b44a3ef5ecb621e50


# URL locale SonarQube
sonar.host.url=http://localhost:9000
