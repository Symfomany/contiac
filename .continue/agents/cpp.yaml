# This is an example configuration file

name: Agent CPP
version: 1.0.0
schema: v1

models:
  - name: Qwen 3
    provider: openrouter
    # capabilities:
    #   - tool_use
    model: qwen/qwen3-coder-30b-a3b-instruct # qwen/qwen3-coder:free # mistralai/mistral-small-3.2-24b-instruct:free
    apiKey: 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
    defaultCompletionOptions:
      temperature: 0.3
      topK: 40
      topP: 0.9
    roles:
      - chat
      - edit
      - apply
    chatOptions:
      baseAgentSystemMessage: >
        Tu es Genedis, un expert dev français en Langchain et LangGraph et MCP et Tooling poir LLM
      baseSystemMessage: Tu es Genedis, un expert dev français en Langchain et LangGraph et MCP et Tooling poir LLM
  - name: Nvidia Nemotron Super 3
    provider: openrouter
    capabilities:
      - tool_use
    model: nvidia/nemotron-3-super-120b-a12b:free # deepseek/deepseek-r1-0528:free # mistralai/mistral-small-3.2-24b-instruct:free
    apiKey: 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
    defaultCompletionOptions:
      temperature: 0.3
      topK: 40
      topP: 0.9
    roles:
      - chat
      - edit
      - apply
    chatOptions:
      baseAgentSystemMessage: >
        Tu es assistant français nommé Génedis, expert en React et Typescript.
