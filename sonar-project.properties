# Configuration SonarQube pour Continue - Focus TypeScript/React
sonar.projectKey=continue-dev-typescript
sonar.projectName=Continue AI Code Assistant (TypeScript Focus)
sonar.projectVersion=1.2.1
sonar.sourceEncoding=UTF-8

# FOCUS: 4 modules TypeScript principaux uniquement
sonar.sources=core,gui/src,extensions/vscode/src

# Tests TypeScript uniquement (ajout de node/tests)
sonar.tests=core/test,gui/src/util,extensions/vscode/e2e,node/tests

# Support TypeScript/JavaScript UNIQUEMENT
sonar.typescript.file.suffixes=.ts,.tsx
sonar.javascript.file.suffixes=.js,.jsx

# Inclusions strictes - TypeScript seulement
sonar.inclusions=**/*.ts,**/*.tsx,**/*.js,**/*.jsx

# Tests TypeScript/JavaScript
sonar.test.inclusions=**/*.test.ts,**/*.test.js,**/*.spec.ts,**/*.spec.js,**/*.vitest.ts
sonar.test.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**



# Exclusions ciblées pour focus TypeScript
sonar.exclusions=**/node_modules/**,\
    **/dist/**,\
    **/build/**,\
    **/coverage/**,\
    **/*.test.ts,\
    **/*.test.js,\
    **/*.spec.ts,\
    **/*.spec.js,\
    **/*.vitest.ts,\
    **/vendor/**,\
    **/media/**,\
    **/__mocks__/**,\
    **/tree-sitter/**,\
    **/textmate-syntaxes/**,\
    **/manual-testing-sandbox/**,\
    **/.vscode/**,\
    **/.idea/**,\
    scripts/**,\
    docs/**,\
    eval/**,\
    sync/**,\
    actions/**,\
    extensions/intellij/**,\
    extensions/cli/**,\
    packages/**,\
    **/*.py,\
    **/*.kt,\
    **/*.kts,\
    **/.run/**,\
    **/gradle/**,\
    **/testdata/**

sonar.coverage.exclusions=**/tree-sitter/**,**/manual-testing-sandbox/**,**/media/**

# # Configuration ESLint pour /core
# sonar.eslint.reportPaths=core/eslint-report.json

# Configuration coverage pour les 4 modules TypeScript
sonar.javascript.lcov.reportPaths=gui/coverage/lcov.info,core/coverage/lcov.info,extensions/vscode/coverage/lcov.info

# Optimisations TypeScript
sonar.typescript.ignoreHeaderComments=true
sonar.typescript.tsconfigPath=core/tsconfig.json,gui/tsconfig.json,extensions/vscode/tsconfig.json

# Qualité et performance
sonar.analysis.mode=publish
sonar.scm.provider=git
sonar.qualitygate.wait=true

# Authentification
sonar.token=squ_168fd97a48a373bc738f68ed2cfec1cbb71f5532
sonar.host.url=http://localhost:9000
